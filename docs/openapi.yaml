openapi: 3.0.3
info:
  title: Menu Labus Mobile API
  version: 1.0.0
  description: Stable API contract for iOS/Android clients.
servers:
  - url: https://menu.labus.pro

tags:
  - name: Auth
  - name: Menu
  - name: Geo
  - name: Orders
  - name: Push
  - name: Reservations

paths:
  /api/v1/menu.php:
    get:
      tags: [Menu]
      summary: Get menu items
      parameters:
        - in: query
          name: category
          schema:
            type: string
            nullable: true
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MenuResponse"
        "500":
          $ref: "#/components/responses/ApiError500"

  /api/v1/geocode.php:
    get:
      tags: [Geo]
      summary: Reverse geocode coordinates via server-side proxy
      parameters:
        - in: query
          name: lat
          required: true
          schema:
            type: number
            minimum: -90
            maximum: 90
        - in: query
          name: lon
          required: true
          schema:
            type: number
            minimum: -180
            maximum: 180
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GeocodeResponse"
        "400":
          $ref: "#/components/responses/ApiError400"
        "502":
          $ref: "#/components/responses/ApiError502"

  /api/v1/auth/login.php:
    post:
      tags: [Auth]
      summary: Login and issue token pair
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginRequest"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LoginResponse"
        "400":
          $ref: "#/components/responses/ApiError400"
        "401":
          $ref: "#/components/responses/ApiError401"
        "403":
          $ref: "#/components/responses/ApiError403"

  /api/v1/auth/me.php:
    get:
      tags: [Auth]
      summary: Get current user by access token
      security:
        - bearerAuth: []
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MeResponse"
        "401":
          $ref: "#/components/responses/ApiError401"

  /api/v1/auth/refresh.php:
    post:
      tags: [Auth]
      summary: Rotate refresh token and issue new pair
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RefreshRequest"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RefreshResponse"
        "400":
          $ref: "#/components/responses/ApiError400"
        "401":
          $ref: "#/components/responses/ApiError401"

  /api/v1/auth/logout.php:
    post:
      tags: [Auth]
      summary: Revoke refresh token (logout)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LogoutRequest"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LogoutResponse"
        "400":
          $ref: "#/components/responses/ApiError400"
        "401":
          $ref: "#/components/responses/ApiError401"

  /api/v1/auth/oauth/google.php:
    post:
      tags: [Auth]
      summary: Login/Register via Google id_token (mobile)
      description: |
        Accepts a Google `id_token`, verifies it, links/creates a user by email,
        then issues mobile access/refresh tokens.

        Requires server env `GOOGLE_OAUTH_CLIENT_IDS` (comma-separated list of allowed client IDs).
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/OAuthGoogleRequest"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OAuthGoogleResponse"
        "400":
          $ref: "#/components/responses/ApiError400"
        "401":
          $ref: "#/components/responses/ApiError401"
        "500":
          $ref: "#/components/responses/ApiError500"

  /api/v1/profile/phone.php:
    post:
      tags: [Auth]
      summary: Set/Update phone (mobile)
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdatePhoneRequest"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UpdatePhoneResponse"
        "400":
          $ref: "#/components/responses/ApiError400"
        "401":
          $ref: "#/components/responses/ApiError401"
        "500":
          $ref: "#/components/responses/ApiError500"

  /api/v1/orders/create.php:
    post:
      tags: [Orders]
      summary: Create order (idempotent)
      security:
        - bearerAuth: []
      parameters:
        - in: header
          name: Idempotency-Key
          required: false
          schema:
            type: string
            maxLength: 128
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/OrderCreateRequest"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OrderCreateResponse"
        "200":
          description: OK (idempotency replay)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OrderCreateResponse"
        "400":
          $ref: "#/components/responses/ApiError400"
        "401":
          $ref: "#/components/responses/ApiError401"
        "409":
          $ref: "#/components/responses/ApiError409"
        "500":
          $ref: "#/components/responses/ApiError500"

  /api/v1/orders/status.php:
    get:
      tags: [Orders]
      summary: Get order status/details
      security:
        - bearerAuth: []
      parameters:
        - in: query
          name: order_id
          required: true
          schema:
            type: integer
            minimum: 1
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OrderStatusResponse"
        "400":
          $ref: "#/components/responses/ApiError400"
        "401":
          $ref: "#/components/responses/ApiError401"
        "403":
          $ref: "#/components/responses/ApiError403"
        "404":
          $ref: "#/components/responses/ApiError404"

  /api/v1/reservations/create.php:
    post:
      tags: [Reservations]
      summary: Create a table reservation (idempotent)
      security:
        - bearerAuth: []
      parameters:
        - in: header
          name: Idempotency-Key
          required: false
          schema:
            type: string
            maxLength: 128
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ReservationCreateRequest"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ReservationCreateResponse"
        "200":
          description: OK (idempotency replay)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ReservationCreateResponse"
        "400":
          $ref: "#/components/responses/ApiError400"
        "401":
          $ref: "#/components/responses/ApiError401"
        "409":
          $ref: "#/components/responses/ApiError409"
        "500":
          $ref: "#/components/responses/ApiError500"

  /api/v1/reservations/availability.php:
    get:
      tags: [Reservations]
      summary: List busy time windows for a single table on a single day
      security:
        - bearerAuth: []
      parameters:
        - in: query
          name: table_label
          required: true
          schema:
            type: string
            maxLength: 64
        - in: query
          name: date
          required: true
          schema:
            type: string
            pattern: "^\\d{4}-\\d{2}-\\d{2}$"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ReservationAvailabilityResponse"
        "400":
          $ref: "#/components/responses/ApiError400"
        "401":
          $ref: "#/components/responses/ApiError401"

  /api/v1/reservations/cancel.php:
    post:
      tags: [Reservations]
      summary: Cancel an existing reservation
      description: >
        Customers can cancel only their own reservations.
        Staff (employee/admin/owner) can cancel any reservation.
        Only `pending` and `confirmed` reservations are cancellable.
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ReservationCancelRequest"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ReservationCancelResponse"
        "400":
          $ref: "#/components/responses/ApiError400"
        "401":
          $ref: "#/components/responses/ApiError401"
        "403":
          $ref: "#/components/responses/ApiError403"
        "404":
          $ref: "#/components/responses/ApiError404"
        "409":
          $ref: "#/components/responses/ApiError409"
        "500":
          $ref: "#/components/responses/ApiError500"

  /api/v1/push/subscribe.php:
    post:
      tags: [Push]
      summary: Save push subscription (auth or guest)
      description: >
        If user is authenticated (Bearer token or session), subscription is linked to user.
        If guest, phone and order_id are required.
      parameters:
        - in: header
          name: Authorization
          required: false
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PushSubscribeRequest"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PushSubscribeResponse"
        "400":
          $ref: "#/components/responses/ApiError400"

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: AccessToken

  responses:
    ApiError400:
      description: Bad Request
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ApiError"
          examples:
            invalid_json:
              value: { success: false, error: "Invalid JSON body", meta: {} }
    ApiError401:
      description: Unauthorized
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ApiError"
          examples:
            missing_bearer:
              value: { success: false, error: "Missing bearer token", meta: {} }
    ApiError403:
      description: Forbidden
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ApiError"
          examples:
            forbidden:
              value: { success: false, error: "Forbidden", meta: {} }
    ApiError404:
      description: Not Found
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ApiError"
          examples:
            not_found:
              value: { success: false, error: "Order not found", meta: {} }
    ApiError409:
      description: Conflict (idempotency)
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ApiError"
          examples:
            idempotency_conflict:
              value: { success: false, error: "Idempotency-Key was already used with a different payload", meta: {} }
    ApiError500:
      description: Internal Server Error
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ApiError"
          examples:
            create_failed:
              value: { success: false, error: "Failed to create order", meta: {} }
    ApiError502:
      description: Bad Gateway
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ApiError"
          examples:
            upstream_unavailable:
              value: { success: false, error: "Geocoding service unavailable", meta: {} }

  schemas:
    ApiSuccess:
      type: object
      required: [success, data]
      properties:
        success:
          type: boolean
          enum: [true]
        data:
          type: object
    ApiError:
      type: object
      required: [success, error, meta]
      properties:
        success:
          type: boolean
          enum: [false]
        error:
          type: string
        meta:
          type: object

    TokenPair:
      type: object
      required: [access_token, refresh_token, token_type, expires_in]
      properties:
        access_token:
          type: string
        refresh_token:
          type: string
        token_type:
          type: string
          example: Bearer
        expires_in:
          type: integer
          example: 3600

    User:
      type: object
      required: [id, email, role]
      properties:
        id:
          type: integer
        email:
          type: string
          format: email
        name:
          type: string
          nullable: true
        phone:
          type: string
          nullable: true
        role:
          type: string

    LoginRequest:
      type: object
      required: [email, password]
      properties:
        email:
          type: string
          format: email
        password:
          type: string
        device_name:
          type: string
          default: mobile

    LoginResponse:
      allOf:
        - $ref: "#/components/schemas/ApiSuccess"
        - type: object
          properties:
            data:
              type: object
              required: [tokens, user]
              properties:
                tokens:
                  $ref: "#/components/schemas/TokenPair"
                user:
                  $ref: "#/components/schemas/User"

    MeResponse:
      allOf:
        - $ref: "#/components/schemas/ApiSuccess"
        - type: object
          properties:
            data:
              $ref: "#/components/schemas/User"

    RefreshRequest:
      type: object
      required: [refresh_token]
      properties:
        refresh_token:
          type: string
        device_name:
          type: string
          default: mobile

    RefreshResponse:
      allOf:
        - $ref: "#/components/schemas/ApiSuccess"
        - type: object
          properties:
            data:
              type: object
              required: [tokens]
              properties:
                tokens:
                  $ref: "#/components/schemas/TokenPair"

    LogoutRequest:
      type: object
      required: [refresh_token]
      properties:
        refresh_token:
          type: string

    LogoutResponse:
      allOf:
        - $ref: "#/components/schemas/ApiSuccess"
        - type: object
          properties:
            data:
              type: object
              required: [revoked]
              properties:
                revoked:
                  type: boolean
                  example: true

    OAuthGoogleRequest:
      type: object
      required: [id_token]
      properties:
        id_token:
          type: string
        device_name:
          type: string
          default: mobile

    OAuthGoogleResponse:
      allOf:
        - $ref: "#/components/schemas/ApiSuccess"
        - type: object
          properties:
            data:
              type: object
              required: [tokens, user, needs_phone]
              properties:
                tokens:
                  $ref: "#/components/schemas/TokenPair"
                user:
                  $ref: "#/components/schemas/User"
                needs_phone:
                  type: boolean

    UpdatePhoneRequest:
      type: object
      required: [phone]
      properties:
        phone:
          type: string
          example: "+79001234567"

    UpdatePhoneResponse:
      allOf:
        - $ref: "#/components/schemas/ApiSuccess"
        - type: object
          properties:
            data:
              type: object
              required: [phone]
              properties:
                phone:
                  type: string
                  example: "+79001234567"

    MenuItem:
      type: object
      properties:
        id: { type: integer }
        name: { type: string }
        description: { type: string, nullable: true }
        composition: { type: string, nullable: true }
        price: { type: string }
        image: { type: string, nullable: true }

    MenuResponse:
      allOf:
        - $ref: "#/components/schemas/ApiSuccess"
        - type: object
          properties:
            data:
              type: object
              required: [category, items]
              properties:
                category:
                  type: string
                  nullable: true
                items:
                  type: array
                  items:
                    $ref: "#/components/schemas/MenuItem"

    GeocodeResponse:
      allOf:
        - $ref: "#/components/schemas/ApiSuccess"
        - type: object
          properties:
            data:
              type: object
              required: [display_name, city, road, house_number, lat, lon]
              properties:
                display_name: { type: string }
                city: { type: string }
                road: { type: string }
                house_number: { type: string }
                lat: { type: number }
                lon: { type: number }

    OrderItemInput:
      type: object
      required: [id, quantity]
      properties:
        id: { type: integer }
        name: { type: string, nullable: true }
        price: { type: number, nullable: true }
        quantity: { type: integer, minimum: 1 }

    OrderCreateRequest:
      type: object
      required: [items, total]
      properties:
        items:
          type: array
          minItems: 1
          items:
            $ref: "#/components/schemas/OrderItemInput"
        total:
          type: number
        delivery_type:
          type: string
          enum: [bar, delivery, table]
          default: bar
        delivery_details:
          type: string
          nullable: true

    OrderCreateResponse:
      allOf:
        - $ref: "#/components/schemas/ApiSuccess"
        - type: object
          properties:
            data:
              type: object
              required: [order_id, status]
              properties:
                order_id: { type: integer }
                status: { type: string }

    OrderStatusResponse:
      allOf:
        - $ref: "#/components/schemas/ApiSuccess"
        - type: object
          properties:
            data:
              type: object
              required: [order_id, status, total, delivery_type, delivery_details, updated_at]
              properties:
                order_id: { type: integer }
                status: { type: string }
                total: { type: number }
                delivery_type: { type: string }
                delivery_details: { type: string }
                updated_at: { type: string }

    PushSubscription:
      type: object
      required: [endpoint, keys]
      properties:
        endpoint:
          type: string
        keys:
          type: object
          required: [p256dh, auth]
          properties:
            p256dh: { type: string }
            auth: { type: string }

    PushSubscribeRequest:
      type: object
      required: [subscription]
      properties:
        subscription:
          $ref: "#/components/schemas/PushSubscription"
        phone:
          type: string
          nullable: true
        order_id:
          type: integer
          nullable: true

    PushSubscribeResponse:
      allOf:
        - $ref: "#/components/schemas/ApiSuccess"
        - type: object
          properties:
            data:
              type: object
              required: [saved]
              properties:
                saved: { type: boolean, example: true }

    ReservationStatus:
      type: string
      enum: [pending, confirmed, seated, cancelled, no_show]

    ReservationCreateRequest:
      type: object
      required: [table_label, guests_count, starts_at, ends_at]
      properties:
        table_label:
          type: string
          maxLength: 64
          example: "T3"
        guests_count:
          type: integer
          minimum: 1
          maximum: 50
        starts_at:
          type: string
          description: "Tenant-local datetime, e.g. '2099-04-25 19:00:00'."
          example: "2099-04-25 19:00:00"
        ends_at:
          type: string
          example: "2099-04-25 21:00:00"
        guest_name:
          type: string
          nullable: true
        guest_phone:
          type: string
          nullable: true
        note:
          type: string
          nullable: true
          maxLength: 1000

    ReservationCreateResponse:
      allOf:
        - $ref: "#/components/schemas/ApiSuccess"
        - type: object
          properties:
            data:
              type: object
              required: [reservation_id, status, table_label, starts_at, ends_at]
              properties:
                reservation_id: { type: integer }
                status:         { $ref: "#/components/schemas/ReservationStatus" }
                table_label:    { type: string }
                starts_at:      { type: string }
                ends_at:        { type: string }

    ReservationBusyWindow:
      type: object
      required: [starts_at, ends_at, status]
      properties:
        starts_at: { type: string }
        ends_at:   { type: string }
        status:    { $ref: "#/components/schemas/ReservationStatus" }

    ReservationAvailabilityResponse:
      allOf:
        - $ref: "#/components/schemas/ApiSuccess"
        - type: object
          properties:
            data:
              type: object
              required: [table_label, date, busy]
              properties:
                table_label: { type: string }
                date:        { type: string }
                busy:
                  type: array
                  items:
                    $ref: "#/components/schemas/ReservationBusyWindow"

    ReservationCancelRequest:
      type: object
      required: [reservation_id]
      properties:
        reservation_id:
          type: integer
          minimum: 1

    ReservationCancelResponse:
      allOf:
        - $ref: "#/components/schemas/ApiSuccess"
        - type: object
          properties:
            data:
              type: object
              required: [reservation_id, status]
              properties:
                reservation_id: { type: integer }
                status:
                  type: string
                  enum: [cancelled]
