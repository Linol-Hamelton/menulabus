# ============================================================
# Custom Domain Template for White Label
# ============================================================
# Usage: Restaurant owner adds a CNAME pointing their
# subdomain/domain to menu.labus.pro. Then apply this template
# on the server with the real domain substituted.
#
# Steps:
# 1. Restaurant adds DNS: menu.myrestaurant.ru CNAME menu.labus.pro
# 2. Copy this file to /etc/nginx/sites-available/menu.myrestaurant.ru.conf
# 3. Replace CUSTOM_DOMAIN with the actual domain
# 4. Run certbot (or use scripts/tenant/go-live.sh)
# 5. ln -s /etc/nginx/sites-available/CUSTOM_DOMAIN.conf /etc/nginx/sites-enabled/
# 6. nginx -t && systemctl reload nginx
# ============================================================

server {
    listen 80;
    listen [::]:80;
    server_name CUSTOM_DOMAIN;

    # Redirect HTTP to HTTPS.
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name CUSTOM_DOMAIN;

    # SSL is managed by certbot.
    ssl_certificate     /etc/letsencrypt/live/CUSTOM_DOMAIN/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/CUSTOM_DOMAIN/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    # Adjust if your deployment root differs.
    root PROJECT_ROOT;
    index index.php;

    # Reuse the same PHP-FPM upstream pools defined in pool-split-upstreams.conf.
    location = /orders-sse.php {
        fastcgi_pass   php_fpm_sse;
        fastcgi_buffering off;
        include        fastcgi_params;
        fastcgi_param  SCRIPT_FILENAME $document_root$fastcgi_script_name;
    }

    # Optional legacy polling endpoint.
    location = /ws-poll.php {
        fastcgi_pass   php_fpm_sse;
        fastcgi_buffering off;
        include        fastcgi_params;
        fastcgi_param  SCRIPT_FILENAME $document_root$fastcgi_script_name;
    }

    location ^~ /api/v1/ {
        fastcgi_pass   php_fpm_api;
        include        fastcgi_params;
        fastcgi_param  SCRIPT_FILENAME $document_root$fastcgi_script_name;
    }

    location ~ \.php$ {
        fastcgi_pass   php_fpm_web;
        include        fastcgi_params;
        fastcgi_param  SCRIPT_FILENAME $document_root$fastcgi_script_name;
    }

    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    # Static assets with long cache.
    location ~* \.(css|js|png|jpg|webp|woff2?|ico|svg)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    access_log /var/log/nginx/CUSTOM_DOMAIN-access.log;
    error_log  /var/log/nginx/CUSTOM_DOMAIN-error.log;
}
