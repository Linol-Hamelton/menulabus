server {
    listen 80;
    listen [::]:80;
    server_name CUSTOM_DOMAIN;

    root PROJECT_ROOT;
    index index.php;

    location /.well-known/acme-challenge/ {
        try_files $uri =404;
    }

    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    access_log /var/log/nginx/CUSTOM_DOMAIN-access.log;
    error_log  /var/log/nginx/CUSTOM_DOMAIN-error.log;
}
